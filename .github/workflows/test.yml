name: tests

# CI Макро-радара: тесты (матрица Python) + e2e smoke + docker build (тест «чистого клона»)
# + безопасность. Зависимости ставятся из закреплённого requirements.lock (детерминизм).
# RADAR_RAG_USE_ST=0 → TF-IDF режим RAG, без сети и тяжёлых моделей.

on:
  push:
    paths:
      - "_tools/**"
      - "requirements.lock"
      - "Dockerfile"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "_tools/**"
      - "requirements.lock"
      - "Dockerfile"
      - ".github/workflows/test.yml"

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # закреплённый стек (numpy 2.4 / scipy 1.17) требует Python >= 3.11
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: _tools
    env:
      RADAR_RAG_USE_ST: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install (locked deps)
        run: |
          python -m pip install --upgrade pip
          pip install -r ../requirements.lock pytest pytest-cov ruff==0.15.19 black==26.5.1
      - name: Lint (ruff) — gate
        run: ruff check .
      - name: Format check (black) — gate
        run: black --check .
      - name: Tests + coverage (gate ≥60%)
        run: pytest tests/ -q --cov=. --cov-report=term-missing --cov-fail-under=60

  smoke:
    name: e2e smoke (pipeline → valid JSON, L0→L3)
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: _tools
    env:
      RADAR_RAG_USE_ST: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install (locked deps)
        run: pip install -r ../requirements.lock
      - name: Run smoke pipeline and assert non-empty L2/L3
        run: |
          python run_pipeline.py --smoke-shock 4.2 --smoke-industry oilgas --json > smoke.json
          python -c "import json; d=json.load(open('smoke.json')); assert d.get('L2_spillover'), 'L2 empty'; assert d.get('L3_segments'), 'L3 empty'; assert d.get('L1_5_osl'), 'L1.5 empty'; print('smoke OK — layers:', [k for k in d if k.startswith('L')])"

  docker:
    name: docker build (clean-clone gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image (test suite runs inside the build)
        run: docker build -t macro-radar .
      - name: Run smoke in container
        run: docker run --rm macro-radar

  security:
    name: security (secrets + deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Dependency audit (runtime lock)
        run: |
          pip install pip-audit
          pip-audit -r requirements.lock || true
